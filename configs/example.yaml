experiment:
  name: "Regression Example"
  description: "Linear vs Ridge vs Lasso on synthetic data"
  version: "0.1.0"

seed:
  base: 42
  n_runs: 20

data:
  n_train: 200
  n_val: 50
  n_test: 50

model:
  hidden_layers: []
  activation: "none"
  dropout: 0.0

training:
  epochs: 1
  learning_rate: 0.01
  batch_size: 64
  optimizer: "adam"
  early_stopping_patience: 0

output:
  results_dir: "results"
  figures_dir: "results/figures"
  save_models: false
  figure_format: ["png"]

statistics:
  alpha: 0.05
  test: "auto"
  correction: "holm"
  rope: 0.01

ci:
  enabled: false
  baseline: ""
  fail_on_no_significance: true
  min_effect_size: 0.0
